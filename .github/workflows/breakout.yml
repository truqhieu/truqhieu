name: generate breakout svg

on:
  push:
    branches: [main]
  workflow_dispatch:  # Cho phép chạy thủ công từ tab Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate breakout svg
        run: |
          echo '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
          <rect width="200" height="200" fill="black"/>
          <circle cx="100" cy="100" r="50" fill="red"/>
          </svg>' > breakout.svg

      - name: Commit files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull origin main || true
          git add breakout.svg
          git commit -m "update breakout svg" || echo "No changes to commit"
          git push
