
name: generate breakout svg

on:
  schedule:
    - cron: "0 */24 * * *"   # chạy 1 lần mỗi ngày
  workflow_dispatch:

jobs:
  generate-svg:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate breakout svg
        uses: cyprieng/github-breakout@v1.0.0

      - name: Commit files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "update breakout svg"
          git push
